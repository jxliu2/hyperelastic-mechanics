# Beta fitting parameters

# initial guess and bounds for beta
beta0: 1.4
beta_lb: 1.001
beta_ub: 3.0

# optical blur width (deformed radius units)
blur_wid: 0.3846  # = 0.5/1.3

# integration domain
x_end: 6.0
n_eval: 50000

# filter: only use data with lambda > lambda_min
lambda_min: 5.0

# downsample to this many evenly spaced points before fitting
n_fit_points: 100

output_dir: outputs/fit
